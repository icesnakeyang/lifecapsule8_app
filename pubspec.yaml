name: lifecapsule8_app
description: "LifeCapsule8 - Write notes to future me"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  flutter_screenutil: ^5.9.3
  get: ^4.7.3
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.2
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  json_annotation: ^4.9.0
  pointycastle: ^4.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^3.0.3
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/private_note.png
    - assets/icons/love2.png
    - assets/icons/wishes.png
    - assets/icons/future.png
    - assets/icons/inspiration.png
    - assets/icons/history.png
    - assets/fonts/

  fonts:
    - family: QingKe
      fonts:
        - asset: assets/fonts/ZCOOLQingKeHuangYou-Regular.ttf
    - family: SanJiLuRongTi
      fonts:
        - asset: assets/fonts/SanJiLuRongTi-2.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-VariableFont_wdth,wght.ttf
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-VariableFont_wght.ttf